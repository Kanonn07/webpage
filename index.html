  <style>
    :root {
      --bg: #fff7f6;
      --surface: #ffffff;
      --text: #241c1f;
      --muted: #6f6267;
      --pink: #e84d75;
      --coral: #ff7a59;
      --mint: #3ba99c;
      --line: #f0d9de;
      --shadow: 0 18px 45px rgba(151, 65, 86, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 8%, rgba(232, 77, 117, 0.14), transparent 32%),
        linear-gradient(180deg, #fff7f6 0%, #fff 45%, #f7fbfa 100%);
      line-height: 1.7;
    }

    a {
      color: inherit;
    }

    .hero {
      min-height: 72vh;
      display: grid;
      align-items: end;
      padding: 32px 20px 42px;
      background:
        linear-gradient(120deg, rgba(36, 28, 31, 0.66), rgba(232, 77, 117, 0.36)),
        url("https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=1800&q=80") center/cover;
      color: #ffffff;
    }

    .hero-inner,
    .content {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-block;
      margin: 0 0 14px;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      font-size: 14px;
      font-weight: 700;
    }

    .hero-logo {
      display: block;
      width: min(300px, 72vw);
      height: auto;
      margin: 0 0 20px;
      filter: drop-shadow(0 14px 26px rgba(36, 28, 31, 0.28));
    }

    h1 {
      max-width: 780px;
      margin: 0;
      font-size: clamp(38px, 8vw, 82px);
      line-height: 1.06;
    }

    .lead {
      max-width: 680px;
      margin: 18px 0 0;
      font-size: clamp(16px, 2.4vw, 20px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .stat {
      min-width: 136px;
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.32);
      backdrop-filter: blur(8px);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .stat span {
      font-size: 13px;
    }

    .content {
      padding: 30px 20px 54px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 12px;
      z-index: 2;
      backdrop-filter: blur(12px);
    }

    .year-panel,
    .season-panel {
      margin-bottom: 22px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .year-panel h2,
    .season-panel h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .year-buttons,
    .season-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
      gap: 10px;
    }

    .year-button,
    .season-button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .year-button.active,
    .season-button.active {
      color: #ffffff;
      background: var(--pink);
      border-color: var(--pink);
    }

    .year-button:disabled {
      color: var(--muted);
      background: #f8f1f3;
      cursor: not-allowed;
    }

    .year-summary,
    .season-summary {
      margin: 14px 0 0;
      color: var(--muted);
    }

    .season-visual {
      overflow: hidden;
      margin-bottom: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .season-visual img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .season-visual figcaption {
      padding: 10px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--text);
      background: #ffffff;
      font: inherit;
    }

    .clear-button {
      min-width: 126px;
      color: var(--pink);
      background: #fff7f6;
      font-weight: 700;
      cursor: pointer;
    }

    .result-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .empty-state {
      margin: 10px 0 0;
      padding: 22px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.68);
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }

    .card {
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .portrait {
      min-height: 174px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: 18px;
      color: #ffffff;
      background:
        linear-gradient(135deg, rgba(232, 77, 117, 0.95), rgba(255, 122, 89, 0.88)),
        repeating-linear-gradient(45deg, transparent 0 14px, rgba(255, 255, 255, 0.16) 14px 16px);
    }

    .portrait.has-photo {
      position: relative;
      min-height: 260px;
      background: #241c1f;
    }

    .portrait.has-photo::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 36%, rgba(36, 28, 31, 0.78));
      z-index: 1;
    }

    .portrait.has-photo img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .portrait.has-photo .nickname,
    .portrait.has-photo .gender {
      position: relative;
      z-index: 2;
    }

    .card:nth-child(3n) .portrait {
      background:
        linear-gradient(135deg, rgba(59, 169, 156, 0.94), rgba(232, 77, 117, 0.82)),
        repeating-linear-gradient(45deg, transparent 0 14px, rgba(255, 255, 255, 0.15) 14px 16px);
    }

    .nickname {
      margin: 0;
      font-size: 34px;
      line-height: 1;
    }

    .gender {
      flex: 0 0 auto;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      font-size: 13px;
      font-weight: 700;
    }

    .body {
      padding: 18px;
    }

    .name {
      margin: 0;
      font-size: 18px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 14px 0;
    }

    .meta div {
      min-height: 58px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #fff7f6;
    }

    .meta span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .meta strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }

    .sns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .sns span {
      padding: 5px 9px;
      border-radius: 999px;
      background: #eef8f6;
      color: #236d65;
      font-size: 12px;
      font-weight: 700;
    }

    .note {
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .hero {
        min-height: 64vh;
      }

      .toolbar {
        grid-template-columns: 1fr;
        position: static;
      }

      .meta {
        grid-template-columns: 1fr;
      }

      .result-bar {
        display: block;
      }
    }
  </style>
</head>

      <div class="hero-stats" aria-label="掲載情報">

    <form class="toolbar" aria-label="メンバー検索">
      <input id="search" type="search" placeholder="名前・出身地・SNSで検索">
      <select id="gender">

        <option value="girls">女子メンバー</option>

      <select id="prefecture">

    <div class="result-bar" aria-live="polite">

    <section class="grid" id="members" aria-label="メンバー一覧"></section>

      プロフィール情報はABEMA公式のメンバー紹介を参考にしています。写真は追加したメンバーだけ表示しています。

    const hero = document.querySelector(".hero");
    const heroLogo = document.querySelector("#heroLogo");
    const heroEyebrow = document.querySelector("#heroEyebrow");
    const heroTitle = document.querySelector("#heroTitle");
    const totalCount = document.querySelector("#totalCount");
    const boysCount = document.querySelector("#boysCount");
    const girlsCount = document.querySelector("#girlsCount");
    const yearButtonsRoot = document.querySelector("#yearButtons");
    const yearSummary = document.querySelector("#yearSummary");
    const seasonButtonsRoot = document.querySelector("#seasonButtons");
    const seasonSummary = document.querySelector("#seasonSummary");
    const seasonVisual = document.querySelector("#seasonVisual");
    const seasonVisualImage = document.querySelector("#seasonVisualImage");
    const seasonVisualCaption = document.querySelector("#seasonVisualCaption");
    const membersRoot = document.querySelector("#members");
    const searchForm = document.querySelector(".toolbar");
    const searchInput = document.querySelector("#search");
    const genderInput = document.querySelector("#gender");
    const prefectureInput = document.querySelector("#prefecture");
    const clearFiltersButton = document.querySelector("#clearFilters");
    const resultCount = document.querySelector("#resultCount");
    const filterSummary = document.querySelector("#filterSummary");
    const emptyState = document.querySelector("#emptyState");

    function createCard(member) {
      const article = document.createElement("article");
      const memberPhoto = photoBySeasonNick[selectedSeason]?.[member.nick] || member.photo;
      article.className = "card";
      article.dataset.gender = member.gender;
      article.dataset.prefecture = member.prefecture;
      article.dataset.search = `${member.nick} ${member.name} ${member.kana} ${member.prefecture} ${member.sns.join(" ")}`.toLowerCase();

      article.innerHTML = `
        <div class="portrait${memberPhoto ? " has-photo" : ""}">
          ${memberPhoto ? `<img src="${memberPhoto}" alt="${member.name}の写真">` : ""}
          <h2 class="nickname">${member.nick}</h2>
          <span class="gender">${member.gender === "boys" ? "男子" : "女子"}</span>
        </div>
        <div class="body">
          <h3 class="name">${member.name}<br><small>${member.kana}</small></h3>
          <div class="meta">
            <div><span>生年月日</span><strong>${member.birthday}</strong></div>
            <div><span>年齢・学年</span><strong>${member.grade}</strong></div>
            <div><span>身長</span><strong>${member.height}</strong></div>
            <div><span>出身地</span><strong>${member.prefecture}</strong></div>
          </div>
          <div class="sns">${member.sns.length ? member.sns.map((item) => `<span>${item}</span>`).join("") : "<span>SNS未公開</span>"}</div>
        </div>
      `;

      return article;
    }

    function getCurrentMembers() {
      return memberData[selectedSeason] || [];
    }

    function updateHero(season, members) {
      const boys = members.filter((member) => member.gender === "boys").length;
      const girls = members.filter((member) => member.gender === "girls").length;
      heroEyebrow.textContent = `今日、好きになりました。${season.label}`;
      heroTitle.textContent = `${season.label}のプロフィール一覧`;
      totalCount.textContent = members.length;
      boysCount.textContent = boys;
      girlsCount.textContent = girls;
    }

    function updatePrefectureOptions(members) {
      const currentValue = prefectureInput.value;
      const prefectures = [...new Set(members.map((member) => member.prefecture))]
        .filter((prefecture) => prefecture && prefecture !== "未公開")
        .sort((a, b) => a.localeCompare(b, "ja"));

      prefectureInput.innerHTML = '<option value="">すべての出身地</option>';
      prefectures.forEach((prefecture) => {
        const option = document.createElement("option");
        option.value = prefecture;
        option.textContent = prefecture;
        prefectureInput.appendChild(option);
      });

      prefectureInput.value = prefectures.includes(currentValue) ? currentValue : "";
    }

    function renderYearButtons() {
      yearButtonsRoot.innerHTML = "";
      years.forEach((item) => {
        const button = document.createElement("button");
        const hasData = (seasons[item.year] || []).some((season) => Boolean(memberData[season.id]));
        button.type = "button";
        button.className = `year-button${item.year === selectedYear ? " active" : ""}`;
        button.textContent = item.label;
        button.title = hasData ? `${item.label}のメンバーを見る` : `${item.label}は追加予定です`;
        button.addEventListener("click", () => {
          selectedYear = item.year;
          selectedSeason = seasons[selectedYear][0].id;
          render();
        });
        yearButtonsRoot.appendChild(button);
      });
    }

    function renderSeasonButtons() {
      const currentSeasons = seasons[selectedYear] || [];
      seasonButtonsRoot.innerHTML = "";
      currentSeasons.forEach((item) => {
        const button = document.createElement("button");
        const hasData = Boolean(memberData[item.id]);
        button.type = "button";
        button.className = `season-button${item.id === selectedSeason ? " active" : ""}`;
        button.textContent = item.label;
        button.title = hasData ? `${item.label}のメンバーを見る` : `${item.label}はプロフィール追加予定です`;
        button.addEventListener("click", () => {
          selectedSeason = item.id;
          render();
        });
        seasonButtonsRoot.appendChild(button);
      });
    }

    function renderInitialState() {
      const allMembers = Object.values(memberData).flat();
      heroLogo.src = initialHeroImage;
      heroEyebrow.textContent = "今日、好きになりました。プロフィールアーカイブ";
      heroTitle.textContent = "年度を選んでプロフィールを見る";
      totalCount.textContent = allMembers.length;
      boysCount.textContent = allMembers.filter((member) => member.gender === "boys").length;
      girlsCount.textContent = allMembers.filter((member) => member.gender === "girls").length;
      yearSummary.textContent = "見たい年度を選択してください。";
      seasonSummary.textContent = "年度を選ぶと、その年の編が表示されます。";
      seasonButtonsRoot.innerHTML = "";
      membersRoot.innerHTML = '<p class="note">年度を選ぶとメンバー一覧が表示されます。</p>';
      resultCount.textContent = "年度を選択してください";
      filterSummary.textContent = "未選択";
      emptyState.classList.add("hidden");
      seasonVisual.classList.add("hidden");
      updatePrefectureOptions([]);
      renderYearButtons();
    }

    function render() {
      if (!selectedYear) {
        renderInitialState();
        return;
      }

      heroLogo.src = initialHeroImage;
      const currentSeasons = seasons[selectedYear] || [];
      const year = years.find((item) => item.year === selectedYear);
      const season = currentSeasons.find((item) => item.id === selectedSeason) || currentSeasons[0];
      const members = getCurrentMembers();
      membersRoot.innerHTML = "";
      yearSummary.textContent = `${year.label}: ${year.description}`;
      seasonSummary.textContent = `${season.label}: ${season.description}`;
      updateHero(season, members);
      updatePrefectureOptions(members);
      renderSeasonVisual();
      renderYearButtons();
      renderSeasonButtons();
      if (members.length === 0) {
        membersRoot.innerHTML = '<p class="note">この編のプロフィールはまだ追加されていません。</p>';
        resultCount.textContent = "0件を表示中";
        filterSummary.textContent = "プロフィール追加待ち";
        emptyState.classList.add("hidden");
        return;
      }
      members.forEach((member) => membersRoot.appendChild(createCard(member)));
      filterCards();
    }

    function renderSeasonVisual() {
      const visual = seasonVisuals[selectedSeason];
      seasonVisual.classList.toggle("hidden", !visual);
      if (!visual) {
        return;
      }
      seasonVisualImage.src = visual.src;
      seasonVisualImage.alt = visual.alt;
      seasonVisualCaption.textContent = visual.caption;
    }

    function filterCards() {
      const keyword = searchInput.value.trim().toLowerCase();
      const gender = genderInput.value;
      const prefecture = prefectureInput.value;
      let visibleCount = 0;

      document.querySelectorAll(".card").forEach((card) => {
        const matchesKeyword = !keyword || card.dataset.search.includes(keyword);
        const matchesGender = !gender || card.dataset.gender === gender;
        const matchesPrefecture = !prefecture || card.dataset.prefecture === prefecture;
        const isVisible = matchesKeyword && matchesGender && matchesPrefecture;
        card.classList.toggle("hidden", !isVisible);
        visibleCount += isVisible ? 1 : 0;
      });

      const genderLabel = genderInput.selectedOptions[0].textContent;
      const prefectureLabel = prefectureInput.value || "すべての出身地";
      const keywordLabel = keyword ? `検索: ${searchInput.value.trim()}` : "検索なし";
      resultCount.textContent = `${visibleCount}件を表示中`;
      filterSummary.textContent = `${genderLabel}・${prefectureLabel}・${keywordLabel}`;
      emptyState.classList.toggle("hidden", visibleCount !== 0);
    }

    [searchInput, genderInput, prefectureInput].forEach((input) => {
      input.addEventListener("input", filterCards);
    });

    searchForm.addEventListener("submit", (event) => {
      event.preventDefault();
    });

    clearFiltersButton.addEventListener("click", () => {
      searchInput.value = "";
      genderInput.value = "";
      prefectureInput.value = "";
      if (!selectedYear) {
        renderInitialState();
        return;
      }
      filterCards();
    });

    render();
</script>
</body>
